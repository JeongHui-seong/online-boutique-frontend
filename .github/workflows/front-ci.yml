name: Frontend CI-CD Pipeline

# 자동화 발생 시점 설정
on:
  push:
    branches: [ "main" ]

# 트리거 발생 시 할 일
jobs:
  build-and-push:
    runs-on: ubuntu-latest # 깃허브가 제공하는 최신 리눅스 컴퓨터 빌려 쓰기
    
    steps:
    # 내 소스 코드 다운로드 받기
    - name: Checkout source code
      uses: actions/checkout@v4

    # 도커 허브 로그인하기 (비밀번호는 보안을 위해 시크릿 변수 처리)
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: hshs99
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # buildx 세팅하기 (linux/amd64 크로스 빌드용)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 빌드하고 도커 허브에 밀어 올리기
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64
        push: true
        tags: hshs99/frontend:latest # 또는 커밋 번호 버전

# 🌟 [핵심 자동화] ArgoCD 저장소를 가져와서 YAML 파일 내부의 이미지 태그를 방금 만든 고유 번호로 치환 후 push합니다.
    - name: Update Kubernetes Manifest in ArgoCD Repo
      run: |
        # 1. ArgoCD 배포 명세서 저장소를 가상 컴퓨터에 clone 받기
        git clone https://${{ secrets.GH_TOKEN }}@github.com/JeongHui-seong/GCP-K8s-ArgoCD.git argocd-repo
        cd argocd-repo
        
        # 2. 리눅스 sed 명령어로 kubernetes-manifest.yaml 안의 프론트엔드 이미지 태그를 최신 태그로 자동 수정
        sed -i 's|image: hshs99/frontend:.*|image: hshs99/frontend:${{ github.sha }}|g' kubernetes-manifest.yaml
        
        # 3. 변경 사항 자동 커밋 및 배포 레포로 Push
        git config --global user.email "jgmltjd99@naver.com"
        git config --global user.name "Github Actions - jhs"
        git add .
        git commit -m "Automated deployment: update frontend image to ${{ github.sha }} version"
        git push origin main